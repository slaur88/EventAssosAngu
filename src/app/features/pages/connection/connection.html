<div class="login-wrapper">
    <div class="container-fluid p-0">
        <div class="row g-0 justify-content-center align-items-center" style="min-height: 100vh;">
            
            <div class="col-11 col-md-6 col-lg-4 central-column login-card">
                
                <h2 class="text-center mb-4 fw-bold text-white">Login</h2>

                <form class="connection">
                    <div class="mb-3">
                        <label class="form-label text-white">E-mail ou Pseudo:</label>
                        <input type="email" class="form-control custom-input" placeholder="exemple@mail.com">
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-white">Password :</label>
                        <input type="password" class="form-control custom-input" placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn btn-custom w-100 btn-lg">Se connecter</button>
                    
                    <p class="text-center mt-3 small">
                        <a href="#" class="text-white-50 text-decoration-none">Mot de passe oublié ?</a>
                    </p>
                </form>

            </div>
        </div>
    </div>
</div>
