<h2>create-event<h2>

    <form [formGroup]="EventFormGroup" class="row" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" id="name" formControlName="name" class="form-control">
      </div>
        <div class="form-group">
            <label for="description">Description:</label>
            <textarea id="description" formControlName="description" class="form-control"></textarea>
        </div>
        <div class="form-group">
            <label for="lieu">Lieu:</label>
            <input type="text" id="lieu" formControlName="lieu" class="form-control">
        </div>
        <div class="form-group">
            <label for="start">Start:</label>
            <input type="datetime-local" id="start" formControlName="start" class="form-control">
        </div>
        <div class="form-group">
            <label for="end">End:</label>
            <input type="datetime-local" id="end" formControlName="end" class="form-control">
        </div>
        <div class="form-group">
            <label for="minUser">Min User:</label>
            <input type="number" id="minUser" formControlName="minUser" class="form-control">
        </div>
        <div class="form-group">
            <label for="maxUser">Max User:</label>
            <input type="number" id="maxUser" formControlName="maxUser" class="form-control">
        </div>
        <div class="form-group">
            <label for="category">Category:</label>
            <input type="text" id="category" formControlName="Category" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Create Event</button>
    </form>
